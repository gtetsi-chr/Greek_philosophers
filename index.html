<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Χρονολόγιο Ελλήνων Φιλοσόφων</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; background: #fdfdfd; overflow: hidden; }
        #header { height: 60px; background: #2c3e50; color: white; display: flex; align-items: center; padding: 0 20px; }
        #cy { width: 100vw; height: calc(100vh - 60px); }
    </style>
</head>
<body>

<div id="header">
    <strong>Χρονολόγιο Ελλήνων Φιλοσόφων (600 π.Χ. - 200 μ.Χ.)</strong>
</div>
<div id="cy"></div>

<script>
async function init() {
    try {
        const response = await fetch('data.csv');
        const text = await response.text();
        const lines = text.split('\n').filter(l => l.trim() !== "");
        
        const elements = [];
        const existingIds = new Set();
        const yearCounters = {}; // Για να απλώνουμε οριζόντια όσους είναι στην ίδια χρονιά

        function getYear(s) {
            if (!s) return 0;
            let y = parseInt(s.replace(/[^0-9]/g, ''));
            return s.includes('π.Χ.') ? -y : y;
        }

        // 1. Φτιάχνουμε τον "Χάρακα" του χρόνου στα αριστερά (X = 50)
        for (let y = -600; y <= 200; y += 100) {
            elements.push({
                data: { id: 'y' + y, label: (y < 0 ? Math.abs(y) + ' π.Χ.' : y + ' μ.Χ.') },
                position: { x: 80, y: (y + 650) * 8 }, // Κλιμάκωση: 8 pixels ανά έτος
                style: { 'background-color': '#e74c3c', 'shape': 'rectangle', 'width': 80, 'color': '#fff' },
                locked: true
            });
        }

        // 2. Επεξεργασία Φιλοσόφων
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(';');
            if (cols.length < 3) continue;

            const id = cols[0].trim();
            const name = cols[1].trim();
            const birthStr = cols[2].trim();
            const birthYear = getYear(birthStr);

            // Υπολογισμός θέσης
            if (!yearGroups[birthYear]) yearGroups[birthYear] = 0;
            const xPos = 300 + (yearGroups[birthYear] * 180); // Τους σπρώχνει δεξιά για να μη συμπίπτουν
            const yPos = (birthYear + 650) * 8; // Η ίδια κλίμακα με τον χάρακα

            elements.push({
                data: { id: id, label: name + '\n(' + birthStr + ')' },
                position: { x: xPos, y: yPos }
            });
            existingIds.add(id);
            yearGroups[birthYear]++;
        }

        // 3. Συνδέσεις
        for (let i = 1; i < lines.length; i++) {
            const cols = lines[i].split(';');
            const s = cols[0].trim();
            const rel = cols[12]?.trim() || "";
            const t = cols[13]?.trim() || "";

            if (t && t !== "-" && existingIds.has(s) && existingIds.has(t)) {
                elements.push({
                    data: { 
                        source: rel.includes("Μαθητής") ? t : s, 
                        target: rel.includes("Μαθητής") ? s : t 
                    }
                });
            }
        }

        const cy = cytoscape({
            container: document.getElementById('cy'),
            elements: elements,
            style: [
                { selector: 'node', style: { 'label': 'data(label)', 'text-wrap': 'wrap', 'text-valign': 'center', 'text-halign': 'center', 'background-color': '#2c3e50', 'color': '#fff', 'font-size': '11px', 'width': '120px', 'height': '50px', 'shape': 'round-rectangle' } },
                { selector: 'edge', style: { 'width': 2, 'line-color': '#bdc3c7', 'target-arrow-shape': 'triangle', 'curve-style': 'taxi', 'taxi-direction': 'vertical' } }
            ],
            layout: { name: 'preset' } // Χρησιμοποιεί τις δικές μας συντεταγμένες X,Y
        });

        cy.fit();
    } catch (e) { console.error(e); }
}
const yearGroups = {};
init();
</script>
</body>
</html>
